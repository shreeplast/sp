<html>

        <head>
<meta charset="UTF-8">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:30px;
}

.container {
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input, textarea, select {
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

button {
    background:#0f7c3f;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    cursor:pointer;
    font-weight:bold;
}

.preview-container {
    margin-top:40px;
}

.board {
    display:flex;
    align-items:center;
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
    overflow:hidden;
    transition:0.3s;
}

.board:hover {
    transform:scale(1.01);
}

.logo {
    max-height:120px;
    max-width:150px;
    margin-right:25px;
    object-fit:contain;
}

.text-area {
    flex:1;
}

.title {
    margin:0;
    line-height:1.1;
    word-break:break-word;
}

.subtitle {
    margin-top:10px;
    letter-spacing:2px;
    word-break:break-word;
}

.small-note {
    font-size:12px;
    opacity:0.7;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Shree Plast – Professional Signage Generator</h2>

<input type="text" id="titleInput" placeholder="Shop Name">

<textarea id="subtitleInput" placeholder="Tagline / Services"></textarea>

<label>Board Width (Feet)</label>
<input type="number" id="widthInput" placeholder="10">

<label>Board Height (Feet)</label>
<input type="number" id="heightInput" placeholder="3">

<label>Upload Logo (Optional)</label>
<input type="file" id="logoInput">

<label>Logo Position</label>
<select id="logoPosition">
<option value="left">Left</option>
<option value="right">Right</option>
<option value="top">Top</option>
</select>

<button onclick="generateBoards()">Generate 6 Mockups</button>

        <a href="studio/index.html" target="_blank">
    <button style="margin-top:10px; background:#222;">
        Create Mockup (Design Studio)
    </button>
</a>
<div class="preview-container" id="preview"></div>

</div>
<script>
function isMarathi(text){
    return /[\u0900-\u097F]/.test(text);
}
        let previousBatch = [];
        
        function generateBoards(){

        let title = document.getElementById("titleInput").value || "Your Shop Name";
        let subtitle = document.getElementById("subtitleInput").value.trim();
        let widthFeet = parseFloat(document.getElementById("widthInput").value) || 10;
        let heightFeet = parseFloat(document.getElementById("heightInput").value) || 3;
        let logoFile = document.getElementById("logoInput").files[0];
        let logoPosition = document.getElementById("logoPosition").value;

        let preview = document.getElementById("preview");
        preview.innerHTML = "";
        let boardWidth = widthFeet * 100; 
        let boardHeight = heightFeet * 70;
        
/* ===== 30 FONT POOL ===== */

let fonts = [
"Montserrat","Poppins","Oswald","Playfair Display","Bebas Neue",
"Raleway","Anton","Barlow","League Spartan","Archivo Black",
"Roboto","Lato","Ubuntu","Inter","Mulish",
"Manrope","Nunito","Exo","Orbitron","Rubik",
"Work Sans","Cabin","DM Sans","Quicksand","Fira Sans",
"PT Sans","Heebo","Kanit","Titillium Web","Teko",

/* 20 Fancy Fonts */
"Pacifico","Lobster","Great Vibes","Sacramento",
"Alfa Slab One","Abril Fatface","Cinzel","Cormorant Garamond",
"Righteous","Permanent Marker","Kaushan Script","Marcellus",
"Playball","Unica One","Black Ops One","Fredericka the Great",
"Bungee","Press Start 2P","Monoton","Audiowide"
];

let marathiThin = [
"Noto Sans Devanagari",
"Hind",
"Mukta",
"IBM Plex Sans Devanagari",
"Yantramanav",
"Khand",
"Rajdhani",
"Pragati Narrow",
"Varta",
"Halant",
"Gotu",
"Asar",
"Sahitya",
"Sumana",
"Laila"
];
let marathiMedium = [
"Tiro Devanagari Marathi",
"Noto Serif Devanagari",
"Karma",
"Kurale",
"Rozha One",
"Sarpanch",
"Glegoo",
"Martel",
"Eczar",
"Cambay",
"Arya",
"Biryani",
"Rhodium Libre",
"Sanskrit Text",
"Vesper Libre",
"Changa",
"Ranga",
"Timmana",
"Sura",
"Modak"
];
let marathiThick = [
"Baloo 2",
"Yatra One",
"Tillana",
"Baloo Bhai 2",
"Baloo Paaji 2",
"Baloo Tamma 2",
"Rozha One",
"Sarpanch",
"Modak",
"Changa"
];
let marathiFancy = [
"Yatra One",
"Tillana",
"Modak",
"Sarpanch",
"Changa",
"Ranga",
"Timmana",
"Sanskrit Text",
"Rozha One",
"Eczar"
];
let marathiAll = [
...marathiThin,
...marathiMedium,
...marathiThick,
...marathiFancy
];

/* ===== PROFESSIONAL BACKGROUND PALETTE ===== */

let backgrounds = [
"#000000","#111111","#1a1a1a","#222831","#14213d",
"#0d1b2a","#1d3557","#2b2d42","#370617","#3a0ca3",
"#003049","#264653","#2a9d8f","#344e41","#283618",
"#780000","#6a040f","#03045e","#023e8a","#001219",
"#ffffff","#f1faee","#edf2f4","#e9ecef","#f8f9fa"
];

/* ===== PROFESSIONAL TEXT COLORS ===== */

let textColors = [
"#ffffff","#fca311","#f4d35e","#e5e5e5","#00ffcc",
"#ef233c","#ffd60a","#ff006e","#90e0ef","#caf0f8",
"#111111","#000000","#2a9d8f","#ffbe0b","#fb5607",
"#8338ec","#3a86ff","#06d6a0","#118ab2","#073b4c",
"#d90429","#ffba08","#4361ee","#4cc9f0","#7209b7"
];

function downloadBoard(boardElement, fileName){

    html2canvas(boardElement, {
        scale: 3, // High resolution (increase to 4 if needed)
        useCORS: true,
        backgroundColor: null
    }).then(canvas => {

        let link = document.createElement("a");
        link.download = fileName.replace(/\s+/g, "_") + ".jpg";
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();

    });
}
                
/* Random Utility */
function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* Avoid immediate repeat batch */
function generateUniqueDesign(){

let design;
let unique = false;

while(!unique){

design = {
bg: randomItem(backgrounds),
titleColor: randomItem(textColors),
subColor: randomItem(textColors),
font: randomItem(fonts)
};

unique = !previousBatch.some(d =>
d.bg === design.bg &&
d.titleColor === design.titleColor &&
d.subColor === design.subColor &&
d.font === design.font
);

}

return design;
}

/* Auto Fit Engine */
function fitTextWidthPriority(element, maxWidth, maxHeight){

    let size = 300;
    element.style.fontSize = size + "px";

    // First shrink by WIDTH only
    while(element.scrollWidth > maxWidth && size > 12){
        size--;
        element.style.fontSize = size + "px";
    }

    // Then check height safety
    while(element.scrollHeight > maxHeight && size > 12){
        size--;
        element.style.fontSize = size + "px";
    }
}

/* Generate 6 New Mockups */
previousBatch = [];

for(let i=0;i<6;i++){

let design = generateUniqueDesign();
previousBatch.push(design);

let board = document.createElement("div");
board.style.background = design.bg;
board.style.width = boardWidth + "px";
board.style.height = boardHeight + "px";
board.style.display = "flex";
board.style.alignItems = "center";
board.style.justifyContent = "center";
board.style.padding = "20px";
board.style.boxSizing = "border-box";
board.style.marginBottom = "35px";
board.style.borderRadius = "18px";

/* Content Container */
let content = document.createElement("div");
content.style.display = "flex";
content.style.flexDirection = "column";
content.style.alignItems = "center";
content.style.justifyContent = "center";
content.style.width = "100%";

/* Title */
let titleEl = document.createElement("div");
titleEl.textContent = title;
titleEl.style.color = design.titleColor;
if(isMarathi(title)){

    let categoryRoll = Math.random();
    let selectedFont;
    let fontType;

    if(categoryRoll < 0.4){
        selectedFont = randomItem(marathiThin);
        fontType = "thin";
    }
    else if(categoryRoll < 0.8){
        selectedFont = randomItem(marathiMedium);
        fontType = "medium";
    }
    else{
        selectedFont = randomItem(marathiThick);
        fontType = "thick";
    }

    // 20% chance of fancy override
    if(Math.random() < 0.2){
        selectedFont = randomItem(marathiFancy);
        fontType = "fancy";
    }

    titleEl.style.fontFamily = selectedFont;

    // Weight balancing
    if(fontType === "thin"){
        titleEl.style.fontWeight = "800";
        titleEl.style.letterSpacing = "1px";
    }
    else if(fontType === "medium"){
        titleEl.style.fontWeight = "700";
        titleEl.style.letterSpacing = "0.5px";
    }
    else if(fontType === "thick"){
        titleEl.style.fontWeight = "600";
        titleEl.style.letterSpacing = "0px";
    }
    else{
        titleEl.style.fontWeight = "700";
        titleEl.style.letterSpacing = "0.5px";
    }

}
else{
    titleEl.style.fontFamily = design.font;
    titleEl.style.fontWeight = "800";
}
titleEl.style.whiteSpace = "pre-wrap";
titleEl.style.textAlign = "center";

/* Subtitle */
let subEl = document.createElement("div");
subEl.textContent = subtitle;
subEl.style.color = design.subColor;
if(isMarathi(subtitle)){

    let categoryRoll = Math.random();
    let selectedFont;

    if(categoryRoll < 0.4){
        selectedFont = randomItem(marathiThin);
        subEl.style.fontWeight = "700";
        subEl.style.letterSpacing = "1px";
    }
    else if(categoryRoll < 0.8){
        selectedFont = randomItem(marathiMedium);
        subEl.style.fontWeight = "600";
        subEl.style.letterSpacing = "0.5px";
    }
    else{
        selectedFont = randomItem(marathiThick);
        subEl.style.fontWeight = "500";
        subEl.style.letterSpacing = "0px";
    }

    // 20% fancy chance
    if(Math.random() < 0.2){
        selectedFont = randomItem(marathiFancy);
        subEl.style.fontWeight = "600";
    }

    subEl.style.fontFamily = selectedFont;

}
else{
    subEl.style.fontFamily = design.font;
    subEl.style.fontWeight = "600";
}
subEl.style.whiteSpace = "pre-wrap";
subEl.style.marginTop = "10px";
subEl.style.textAlign = "center";

content.appendChild(titleEl);

if(subtitle !== ""){
    content.appendChild(subEl);
}

/* Logo Logic */
if(logoFile){

let reader = new FileReader();
reader.onload = function(e){

let logo = document.createElement("img");
logo.src = e.target.result;
logo.style.maxHeight = boardHeight * 0.6 + "px";
logo.style.maxWidth = boardWidth * 0.25 + "px";
logo.style.objectFit = "contain";
logo.style.margin = "20px";

if(logoPosition === "left"){
board.style.justifyContent = "space-between";
board.appendChild(logo);
board.appendChild(content);
}
else if(logoPosition === "right"){
board.style.justifyContent = "space-between";
board.appendChild(content);
board.appendChild(logo);
}
else{
board.style.flexDirection = "column";
board.appendChild(logo);
board.appendChild(content);
}

setTimeout(()=>{
fitTextWidthPriority(titleEl, content.clientWidth, boardHeight * 0.7);
if(subtitle !== ""){
    fitTextWidthPriority(subEl, content.clientWidth, boardHeight * 0.25);
}
},10);

}
reader.readAsDataURL(logoFile);

}
else{

board.appendChild(content);

setTimeout(()=>{
fitTextWidthPriority(titleEl, boardWidth * 0.9, boardHeight * 0.7);
if(subtitle !== ""){
    fitTextWidthPriority(subEl, boardWidth * 0.9, boardHeight * 0.25);
}
},10);

}

// Create Download Button
let downloadBtn = document.createElement("button");
downloadBtn.textContent = "Download JPEG";
downloadBtn.style.marginBottom = "40px";
downloadBtn.style.background = "#111";
downloadBtn.style.width = "200px";
downloadBtn.style.display = "block";
downloadBtn.style.margin = "10px auto 40px auto";

downloadBtn.onclick = function(){
    downloadBoard(board, title);
};

preview.appendChild(board);
preview.appendChild(downloadBtn);

}

}

</script>
</body>
</html>
