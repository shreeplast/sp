<!DOCTYPE html>
<html>
<head>
<title>Shree Plast - Smart Signage Generator</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Poppins:wght@500;700&family=Oswald:wght@600&family=Playfair+Display:wght@700&family=Raleway:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Montserrat', sans-serif;
    background:#f4f4f4;
    padding:30px;
    margin:0;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.generator-box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    max-width:900px;
    margin:auto;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

.size-row{
    display:flex;
    gap:10px;
}

button{
    width:100%;
    padding:14px;
    background:#0b7d3b;
    color:white;
    border:none;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

.layouts{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.board{
    border-radius:10px;
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.name{
    font-size:clamp(20px,4vw,38px);
    font-weight:800;
}

.tagline{
    margin-top:8px;
    font-size:14px;
}

.services{
    margin-top:12px;
    font-size:13px;
    letter-spacing:1px;
}
</style>
</head>

<body>

<h1>Shree Plast – Professional Signage Generator</h1>

<div class="generator-box">

<input type="text" id="shopName" placeholder="Shop / Business Name">

<input type="text" id="tagline" placeholder="Tagline (Optional)">

<textarea id="services" placeholder="Services (Eg: LED Signage | Acrylic Letters | CNC Work)"></textarea>

<div class="size-row">
<input type="number" id="width" placeholder="Width (Feet)">
<input type="number" id="height" placeholder="Height (Feet)">
</div>

<button onclick="generateBoards()">Generate Professional Layouts</button>

</div>

<div class="layouts" id="output"></div>

<script>

function generateBoards(){

let name = document.getElementById("shopName").value;
let tagline = document.getElementById("tagline").value;
let services = document.getElementById("services").value;
let w = document.getElementById("width").value;
let h = document.getElementById("height").value;

if(!name || !w || !h){
    alert("Please enter Name and Board Size");
    return;
}

let ratio = w/h;

let output = document.getElementById("output");
output.innerHTML = "";

/* Layout 1 */
createBoard(name, tagline, services, ratio,
"#0c1b2a","#ffffff","Montserrat");

/* Layout 2 */
createBoard(name, tagline, services, ratio,
"#000000","#f4c430","Playfair Display");

/* Layout 3 */
createBoard(name, tagline, services, ratio,
"#ffffff","#c40000","Oswald");

/* Layout 4 */
createBoard(name, tagline, services, ratio,
"#2d2d44","#ff2e4d","Bebas Neue");

/* Layout 5 */
createBoard(name, tagline, services, ratio,
"#13294b","#ffb703","Raleway");

/* Layout 6 */
createBoard(name, tagline, services, ratio,
"#f2f2f2","#222222","Poppins");

}

function createBoard(name, tagline, services, ratio, bg, color, font){

let board = document.createElement("div");
board.className = "board";
board.style.background = bg;
board.style.color = color;
board.style.fontFamily = font;
board.style.aspectRatio = ratio;

board.innerHTML = `
<div class="name">${name}</div>
<div class="tagline">${tagline}</div>
<div class="services">${services}</div>
`;

document.getElementById("output").appendChild(board);
}

</script>

</body>
</html>
