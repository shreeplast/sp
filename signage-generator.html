<!DOCTYPE html>
<html>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <head>
<meta charset="UTF-8">
<title>Shree Plast - Pro Signage Generator</title>

<link href="https://fonts.googleapis.com/css2?
family=Montserrat:wght@700&
family=Poppins:wght@700&
family=Oswald:wght@700&
family=Playfair+Display:wght@700&
family=Bebas+Neue&
family=Raleway:wght@800&
family=Anton&
family=Barlow:wght@800&
family=League+Spartan:wght@800&
family=Archivo+Black&
family=Roboto:wght@700&
family=Lato:wght@700&
family=Ubuntu:wght@700&
family=Inter:wght@800&
family=Mulish:wght@800&
family=Manrope:wght@800&
family=Nunito:wght@800&
family=Exo:wght@800&
family=Orbitron:wght@800&
family=Rubik:wght@800&
family=Work+Sans:wght@800&
family=Cabin:wght@700&
family=DM+Sans:wght@800&
family=Quicksand:wght@800&
family=Fira+Sans:wght@800&
family=PT+Sans:wght@700&
family=Heebo:wght@800&
family=Kanit:wght@800&
family=Titillium+Web:wght@800&
family=Teko:wght@700&
display=swap" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:30px;
}

.container {
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input, textarea, select {
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

button {
    background:#0f7c3f;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    cursor:pointer;
    font-weight:bold;
}

.preview-container {
    margin-top:40px;
}

.board {
    display:flex;
    align-items:center;
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
    overflow:hidden;
    transition:0.3s;
}

.board:hover {
    transform:scale(1.01);
}

.logo {
    max-height:120px;
    max-width:150px;
    margin-right:25px;
    object-fit:contain;
}

.text-area {
    flex:1;
}

.title {
    margin:0;
    line-height:1.1;
    word-break:break-word;
}

.subtitle {
    margin-top:10px;
    letter-spacing:2px;
    word-break:break-word;
}

.small-note {
    font-size:12px;
    opacity:0.7;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Shree Plast – Professional Signage Generator</h2>

<input type="text" id="titleInput" placeholder="Shop Name">

<textarea id="subtitleInput" placeholder="Tagline / Services"></textarea>

<label>Board Width (Feet)</label>
<input type="number" id="widthInput" placeholder="10">

<label>Board Height (Feet)</label>
<input type="number" id="heightInput" placeholder="3">

<label>Upload Logo (Optional)</label>
<input type="file" id="logoInput">

<label>Logo Position</label>
<select id="logoPosition">
<option value="left">Left</option>
<option value="right">Right</option>
<option value="top">Top</option>
</select>

<button onclick="generateBoards()">Generate 6 Mockups</button>

<div class="preview-container" id="preview"></div>

</div>

<script>

let previousBatch = [];

function generateBoards(){

let title = document.getElementById("titleInput").value || "Your Shop Name";
let subtitle = document.getElementById("subtitleInput").value || "Your Tagline Here";
let widthFeet = parseFloat(document.getElementById("widthInput").value) || 10;
let heightFeet = parseFloat(document.getElementById("heightInput").value) || 3;
let logoFile = document.getElementById("logoInput").files[0];
let logoPosition = document.getElementById("logoPosition").value;

let preview = document.getElementById("preview");
preview.innerHTML = "";

let boardWidth = widthFeet * 100;
let boardHeight = heightFeet * 70;

/* ===== 30 FONT POOL ===== */

let fonts = [
"Montserrat","Poppins","Oswald","Playfair Display","Bebas Neue",
"Raleway","Anton","Barlow","League Spartan","Archivo Black",
"Roboto","Lato","Ubuntu","Inter","Mulish",
"Manrope","Nunito","Exo","Orbitron","Rubik",
"Work Sans","Cabin","DM Sans","Quicksand","Fira Sans",
"PT Sans","Heebo","Kanit","Titillium Web","Teko"
];

/* ===== PROFESSIONAL BACKGROUND PALETTE ===== */

let backgrounds = [
"#000000","#111111","#1a1a1a","#222831","#14213d",
"#0d1b2a","#1d3557","#2b2d42","#370617","#3a0ca3",
"#003049","#264653","#2a9d8f","#344e41","#283618",
"#780000","#6a040f","#03045e","#023e8a","#001219",
"#ffffff","#f1faee","#edf2f4","#e9ecef","#f8f9fa"
];

/* ===== PROFESSIONAL TEXT COLORS ===== */

let textColors = [
"#ffffff","#fca311","#f4d35e","#e5e5e5","#00ffcc",
"#ef233c","#ffd60a","#ff006e","#90e0ef","#caf0f8",
"#111111","#000000","#2a9d8f","#ffbe0b","#fb5607",
"#8338ec","#3a86ff","#06d6a0","#118ab2","#073b4c",
"#d90429","#ffba08","#4361ee","#4cc9f0","#7209b7"
];

/* Random Utility */
function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* Avoid immediate repeat batch */
function generateUniqueDesign(){

let design;
let unique = false;

while(!unique){

design = {
bg: randomItem(backgrounds),
titleColor: randomItem(textColors),
subColor: randomItem(textColors),
font: randomItem(fonts)
};

unique = !previousBatch.some(d =>
d.bg === design.bg &&
d.titleColor === design.titleColor &&
d.subColor === design.subColor &&
d.font === design.font
);

}

return design;
}

/* Auto Fit Engine */
function fitTextHorizontal(element, maxWidth){

let size = 300;
element.style.fontSize = size + "px";

while(element.scrollWidth > maxWidth && size > 10){
    size -= 1;
    element.style.fontSize = size + "px";
}

}

/* Generate 6 New Mockups */
previousBatch = [];

for(let i=0;i<6;i++){

let design = generateUniqueDesign();
previousBatch.push(design);

let board = document.createElement("div");
board.className = "board";
board.style.background = design.bg;
board.style.width = boardWidth + "px";
board.style.height = boardHeight + "px";
board.style.display = "flex";
board.style.alignItems = "center";
board.style.justifyContent = "center";
board.style.padding = "20px";
board.style.boxSizing = "border-box";
board.style.marginBottom = "10px";
board.style.borderRadius = "18px";

/* Content Container */
let content = document.createElement("div");
content.style.display = "flex";
content.style.flexDirection = "column";
content.style.alignItems = "center";
content.style.justifyContent = "center";
content.style.width = "100%";

/* Title */
let titleEl = document.createElement("div");
titleEl.innerText = title;
titleEl.style.color = design.titleColor;
titleEl.style.fontFamily = design.font;
titleEl.style.whiteSpace = "nowrap";
titleEl.style.display = "block";
titleEl.style.textAlign = "center";

/* Subtitle */
let subEl = document.createElement("div");
subEl.innerText = subtitle;
subEl.style.color = design.subColor;
subEl.style.fontFamily = design.font;
subEl.style.whiteSpace = "nowrap";
subEl.style.display = "block";
subEl.style.marginTop = "10px";
subEl.style.textAlign = "center";

titleEl.style.fontWeight = "800";
subEl.style.fontWeight = "600";

titleEl.style.letterSpacing = "2px";
subEl.style.letterSpacing = "1px";
    
content.appendChild(titleEl);
content.appendChild(subEl);

/* Logo Logic */
if(logoFile){

let reader = new FileReader();
reader.onload = function(e){

let logo = document.createElement("img");
logo.src = e.target.result;
logo.style.maxHeight = boardHeight * 0.6 + "px";
logo.style.maxWidth = boardWidth * 0.25 + "px";
logo.style.objectFit = "contain";
logo.style.margin = "20px";

if(logoPosition === "left"){
board.style.justifyContent = "space-between";
board.appendChild(logo);
board.appendChild(content);
}
else if(logoPosition === "right"){
board.style.justifyContent = "space-between";
board.appendChild(content);
board.appendChild(logo);
}
else{
board.style.flexDirection = "column";
board.appendChild(logo);
board.appendChild(content);
}

setTimeout(()=>{
fitTextHorizontal(titleEl, content.clientWidth);
fitTextHorizontal(subEl, content.clientWidth);
},10);

}
reader.readAsDataURL(logoFile);

}
else{

board.appendChild(content);

setTimeout(()=>{
fitTextHorizontal(titleEl, boardWidth * 0.9);
fitTextHorizontal(subEl, boardWidth * 0.9);
},10);

}

preview.appendChild(board);
    /* Download Button */
let downloadBtn = document.createElement("button");
downloadBtn.innerText = "Download PNG";
downloadBtn.style.marginBottom = "40px";
downloadBtn.style.padding = "10px 20px";
downloadBtn.style.background = "#111";
downloadBtn.style.color = "#fff";
downloadBtn.style.border = "none";
downloadBtn.style.cursor = "pointer";
downloadBtn.style.borderRadius = "6px";

downloadBtn.onclick = function(){

html2canvas(board, {
scale: 3, // High resolution
useCORS: true
}).then(canvas => {

let link = document.createElement("a");
link.download = title.replace(/\s+/g,'_') + ".png";
link.href = canvas.toDataURL("image/png");
link.click();

});

};

preview.appendChild(downloadBtn);

}

}

</script>
</body>
</html>
