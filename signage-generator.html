<!DOCTYPE html>
<html>
<head>
<title>Shree Plast - Advanced Signage Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Oswald:wght@600&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>

body{
    font-family:Montserrat,sans-serif;
    background:#f4f4f4;
    padding:40px;
    margin:0;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.generator-box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    max-width:1000px;
    margin:auto;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

.row{
    display:flex;
    gap:15px;
}

button{
    padding:14px;
    width:100%;
    background:#0b7d3b;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.layouts{
    margin-top:50px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:40px;
}

.board{
    position:relative;
    border-radius:16px;
    padding:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

.board-inner{
    display:flex;
    align-items:center;
    width:100%;
    height:100%;
}

.logo{
    max-height:80%;
    max-width:30%;
    object-fit:contain;
}

.text-block{
    display:flex;
    flex-direction:column;
    justify-content:center;
    white-space:nowrap;
}

.name{
    font-weight:800;
}

.services{
    margin-top:8px;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
}

</style>
</head>
<body>

<h1>Shree Plast – Advanced Signage Generator</h1>

<div class="generator-box">

<input type="text" id="shopName" placeholder="Shop Name">

<textarea id="services" placeholder="Services (CABINETS | TROLLEYS | ACCESSORIES)"></textarea>

<div class="row">
<input type="number" id="width" placeholder="Width (Feet)">
<input type="number" id="height" placeholder="Height (Feet)">
</div>

<label>Upload Logo (Optional)</label>
<input type="file" id="logoUpload" accept="image/*">

<select id="logoPosition">
<option value="left">Logo Left</option>
<option value="right">Logo Right</option>
<option value="top">Logo Top</option>
</select>

<button onclick="generateBoards()">Generate Layouts</button>

</div>

<div class="layouts" id="output"></div>

<script>

function generateBoards(){

let name = document.getElementById("shopName").value.trim();
let services = document.getElementById("services").value.trim();
let width = parseFloat(document.getElementById("width").value);
let height = parseFloat(document.getElementById("height").value);
let logoFile = document.getElementById("logoUpload").files[0];
let logoPosition = document.getElementById("logoPosition").value;

if(!name || !width || !height){
    alert("Enter name and board size");
    return;
}

let ratio = width / height;
let boardHeight = 200;
let boardWidth = boardHeight * ratio;

if(boardWidth > 1000){
    boardWidth = 1000;
    boardHeight = boardWidth / ratio;
}

let output = document.getElementById("output");
output.innerHTML = "";

let colors = [
["#0c1b2a","#ffffff"],
["#000000","#f4c430"],
["#ffffff","#c40000"],
["#13294b","#ffb703"]
];

colors.forEach(colorSet => {

let board = document.createElement("div");
board.className = "board";
board.style.background = colorSet[0];
board.style.color = colorSet[1];
board.style.width = boardWidth + "px";
board.style.height = boardHeight + "px";

let inner = document.createElement("div");
inner.className = "board-inner";

let textBlock = document.createElement("div");
textBlock.className = "text-block";

let nameEl = document.createElement("div");
nameEl.className = "name";
nameEl.innerText = name;

let servicesEl = document.createElement("div");
servicesEl.className = "services";
servicesEl.innerText = services;

textBlock.appendChild(nameEl);
if(services) textBlock.appendChild(servicesEl);

if(logoFile){

let reader = new FileReader();
reader.onload = function(e){

let img = document.createElement("img");
img.src = e.target.result;
img.className = "logo";

if(logoPosition === "left"){
inner.style.flexDirection = "row";
inner.appendChild(img);
inner.appendChild(textBlock);
textBlock.style.marginLeft = "20px";
}

if(logoPosition === "right"){
inner.style.flexDirection = "row";
inner.appendChild(textBlock);
inner.appendChild(img);
textBlock.style.marginRight = "20px";
}

if(logoPosition === "top"){
inner.style.flexDirection = "column";
inner.appendChild(img);
inner.appendChild(textBlock);
img.style.marginBottom = "10px";
}

};

reader.readAsDataURL(logoFile);

}else{
inner.style.justifyContent = "center";
inner.appendChild(textBlock);
}

board.appendChild(inner);
output.appendChild(board);

autoResizeText(nameEl, boardWidth * 0.12);
});

}

function autoResizeText(element, maxSize){
let size = maxSize;
element.style.fontSize = size + "px";

while(element.scrollWidth > element.parentElement.clientWidth && size > 12){
size--;
element.style.fontSize = size + "px";
}
}

</script>

</body>
</html>
