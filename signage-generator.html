<!DOCTYPE html>
<html>
<head>
<title>Shree Plast - Pro Signage Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Oswald:wght@600&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Montserrat,sans-serif;
    background:#f4f4f4;
    padding:40px;
    margin:0;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.generator-box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    max-width:1000px;
    margin:auto;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

.row{
    display:flex;
    gap:15px;
}

button{
    padding:14px;
    width:100%;
    background:#0b7d3b;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.layouts{
    margin-top:60px;
    display:flex;
    flex-direction:column;
    gap:60px;
    align-items:center;
}

.board{
    border-radius:18px;
    padding:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.logo{
    object-fit:contain;
}

.text-block{
    display:flex;
    flex-direction:column;
    justify-content:center;
    overflow:hidden;
}

.name{
    font-weight:800;
    white-space:nowrap;
}

.services{
    margin-top:10px;
    letter-spacing:2px;
    text-transform:uppercase;
    white-space:nowrap;
}

</style>
</head>
<body>

<h1>Shree Plast – Professional Signage Generator</h1>

<div class="generator-box">

<input type="text" id="shopName" placeholder="Shop Name">

<textarea id="services" placeholder="Services (CABINETS | TROLLEYS | ACCESSORIES)"></textarea>

<div class="row">
<input type="number" id="width" placeholder="Width (Feet)">
<input type="number" id="height" placeholder="Height (Feet)">
</div>

<label>Upload Logo (Optional)</label>
<input type="file" id="logoUpload" accept="image/*">

<select id="logoPosition">
<option value="left">Logo Left</option>
<option value="right">Logo Right</option>
<option value="top">Logo Top</option>
</select>

<button onclick="generateBoard()">Generate Layout</button>

</div>

<div class="layouts" id="output"></div>

<script>

function generateBoard(){

let name = document.getElementById("shopName").value.trim();
let services = document.getElementById("services").value.trim();
let widthFt = parseFloat(document.getElementById("width").value);
let heightFt = parseFloat(document.getElementById("height").value);
let logoFile = document.getElementById("logoUpload").files[0];
let logoPosition = document.getElementById("logoPosition").value;

if(!name || !widthFt || !heightFt){
    alert("Enter name and board size");
    return;
}

let output = document.getElementById("output");
output.innerHTML = "";

/* SCALE LOGIC */
let baseHeight = 250;
let ratio = widthFt / heightFt;
let boardHeight = baseHeight;
let boardWidth = boardHeight * ratio;

/* Limit max width */
if(boardWidth > 1200){
    boardWidth = 1200;
    boardHeight = boardWidth / ratio;
}

let board = document.createElement("div");
board.className = "board";
board.style.width = boardWidth + "px";
board.style.height = boardHeight + "px";
board.style.background = "#13294b";
board.style.color = "#ffffff";

let inner = document.createElement("div");
inner.style.display = "flex";
inner.style.alignItems = "center";
inner.style.width = "100%";
inner.style.height = "100%";
inner.style.gap = "30px";

let textBlock = document.createElement("div");
textBlock.className = "text-block";
textBlock.style.flex = "1";

let nameEl = document.createElement("div");
nameEl.className = "name";
nameEl.innerText = name;

let servicesEl = document.createElement("div");
servicesEl.className = "services";
servicesEl.innerText = services;

textBlock.appendChild(nameEl);
if(services) textBlock.appendChild(servicesEl);

function finalizeLayout(logoImg){

if(logoImg){

let logoMaxHeight = boardHeight * 0.6;
logoImg.style.maxHeight = logoMaxHeight + "px";
logoImg.style.maxWidth = boardWidth * 0.3 + "px";
logoImg.className = "logo";

if(logoPosition === "left"){
inner.style.flexDirection = "row";
inner.appendChild(logoImg);
inner.appendChild(textBlock);
}

if(logoPosition === "right"){
inner.style.flexDirection = "row";
inner.appendChild(textBlock);
inner.appendChild(logoImg);
}

if(logoPosition === "top"){
inner.style.flexDirection = "column";
inner.appendChild(logoImg);
inner.appendChild(textBlock);
}

}else{
inner.style.justifyContent = "center";
inner.appendChild(textBlock);
}

/* FONT SCALING BASED ON HEIGHT */
let nameSize = boardHeight * 0.25;
let serviceSize = boardHeight * 0.08;

autoFit(nameEl, nameSize);
autoFit(servicesEl, serviceSize);

board.appendChild(inner);
output.appendChild(board);
}

if(logoFile){
let reader = new FileReader();
reader.onload = function(e){
let img = document.createElement("img");
img.src = e.target.result;
finalizeLayout(img);
};
reader.readAsDataURL(logoFile);
}else{
finalizeLayout(null);
}

}

function autoFit(element, maxSize){
let size = maxSize;
element.style.fontSize = size + "px";

while(element.scrollWidth > element.parentElement.clientWidth && size > 10){
size--;
element.style.fontSize = size + "px";
}
}

</script>

</body>
</html>
