<script>

function generateBoards(){

let title = document.getElementById("titleInput").value || "Your Shop Name";
let subtitle = document.getElementById("subtitleInput").value || "Your Tagline Here";
let widthFeet = parseFloat(document.getElementById("widthInput").value) || 10;
let heightFeet = parseFloat(document.getElementById("heightInput").value) || 3;
let logoFile = document.getElementById("logoInput").files[0];
let logoPosition = document.getElementById("logoPosition").value;

let preview = document.getElementById("preview");
preview.innerHTML = "";

/* Convert Feet to Pixels */
let boardWidth = widthFeet * 100;
let boardHeight = heightFeet * 70;

/* 6 Design Variations */
let designs = [
{bg:"#0d1b2a", titleColor:"#ffffff", subColor:"#fca311", font:"Montserrat"},
{bg:"#000000", titleColor:"#f4d35e", subColor:"#ffffff", font:"Bebas Neue"},
{bg:"#14213d", titleColor:"#ffffff", subColor:"#e5e5e5", font:"Poppins"},
{bg:"#ffffff", titleColor:"#111111", subColor:"#444444", font:"Playfair Display"},
{bg:"#1a1a1a", titleColor:"#00ffcc", subColor:"#ffffff", font:"Oswald"},
{bg:"#2b2d42", titleColor:"#edf2f4", subColor:"#ef233c", font:"Raleway"}
];

/* Function to Auto Fit Font */
function fitText(element, maxWidth, maxHeight){

let size = 200; // start large
element.style.fontSize = size + "px";

while(
    (element.scrollWidth > maxWidth || element.scrollHeight > maxHeight)
    && size > 10
){
    size--;
    element.style.fontSize = size + "px";
}
}

/* Create Boards */
designs.forEach(design => {

let board = document.createElement("div");
board.className = "board";
board.style.background = design.bg;
board.style.width = boardWidth + "px";
board.style.height = boardHeight + "px";
board.style.display = "flex";
board.style.alignItems = "center";
board.style.justifyContent = "center";
board.style.padding = "20px";
board.style.boxSizing = "border-box";
board.style.marginBottom = "30px";
board.style.borderRadius = "15px";

/* Main Content Container */
let content = document.createElement("div");
content.style.display = "flex";
content.style.flexDirection = "column";
content.style.alignItems = "center";
content.style.justifyContent = "center";
content.style.width = "100%";

/* Title */
let titleEl = document.createElement("div");
titleEl.className = "title";
titleEl.innerText = title;
titleEl.style.color = design.titleColor;
titleEl.style.fontFamily = design.font;

/* Subtitle */
let subEl = document.createElement("div");
subEl.className = "subtitle";
subEl.innerText = subtitle;
subEl.style.color = design.subColor;
subEl.style.fontFamily = design.font;
subEl.style.marginTop = "10px";

content.appendChild(titleEl);
content.appendChild(subEl);

/* Logo Handling */
if(logoFile){

let reader = new FileReader();
reader.onload = function(e){

let logo = document.createElement("img");
logo.src = e.target.result;
logo.style.maxHeight = boardHeight * 0.6 + "px";
logo.style.maxWidth = boardWidth * 0.25 + "px";
logo.style.objectFit = "contain";
logo.style.margin = "15px";

if(logoPosition === "left"){
board.style.justifyContent = "space-between";
board.appendChild(logo);
board.appendChild(content);
}
else if(logoPosition === "right"){
board.style.justifyContent = "space-between";
board.appendChild(content);
board.appendChild(logo);
}
else if(logoPosition === "top"){
board.style.flexDirection = "column";
board.appendChild(logo);
board.appendChild(content);
}

/* Fit text AFTER layout */
setTimeout(()=>{
fitText(titleEl, content.clientWidth, boardHeight * 0.5);
fitText(subEl, content.clientWidth, boardHeight * 0.25);
},10);

}
reader.readAsDataURL(logoFile);

}
else{
board.appendChild(content);

setTimeout(()=>{
fitText(titleEl, boardWidth * 0.9, boardHeight * 0.5);
fitText(subEl, boardWidth * 0.9, boardHeight * 0.25);
},10);
}

preview.appendChild(board);

});

}

</script>
