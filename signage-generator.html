<!DOCTYPE html>
<html>
<head>
<title>Shree Plast - Professional Signage Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Poppins:wght@500;700&family=Oswald:wght@500;700&family=Playfair+Display:wght@600&family=Raleway:wght@500;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:20px;
    background:#e9e9e9;
    font-family: 'Poppins', sans-serif;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.form-box{
    background:#fff;
    padding:20px;
    max-width:1000px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

input, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:15px;
    border-radius:6px;
    border:1px solid #aaa;
}

.row{
    display:flex;
    gap:10px;
}

.row input{
    flex:1;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:17px;
    background:#0a7f3f;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#086b34;
}

.preview-area{
    margin-top:40px;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
}

/* Common board styling */
.board{
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:30px;
    border-radius:6px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
    text-align:center;
    overflow:hidden;
}

.tag{
    font-size:18px;
    margin-top:8px;
}

.services{
    font-size:14px;
    margin-top:14px;
    letter-spacing:1px;
}

</style>
</head>

<body>

<h1>Shree Plast - Professional Signage Generator</h1>

<div class="form-box">
    <input type="text" id="name" placeholder="Shop / Business Name">

    <input type="text" id="tagline" placeholder="Tagline (Optional)">

    <textarea id="services" placeholder="Services (Example: Shirts | Trousers | Blazers)"></textarea>

    <div class="row">
        <input type="number" id="width" placeholder="Board Width (Feet)" value="10">
        <input type="number" id="height" placeholder="Board Height (Feet)" value="2">
    </div>

    <button onclick="generate()">Generate 6 Professional Layouts</button>
</div>

<div class="preview-area" id="preview"></div>

<script>

function generate(){

    let name = document.getElementById("name").value;
    let tag = document.getElementById("tagline").value;
    let services = document.getElementById("services").value;
    let width = document.getElementById("width").value;
    let height = document.getElementById("height").value;

    if(!name){
        alert("Please enter shop name");
        return;
    }

    let preview = document.getElementById("preview");
    preview.innerHTML = "";

    let ratio = width/height;

    const layouts = [

        // 1 Modern Blue
        {
            bg:"#0d1b2a",
            color:"#ffffff",
            font:"'Montserrat', sans-serif",
            nameSize:"38px"
        },

        // 2 Luxury Black Gold
        {
            bg:"#000000",
            color:"#d4af37",
            font:"'Playfair Display', serif",
            nameSize:"40px"
        },

        // 3 Bold Red Retail
        {
            bg:"#ffffff",
            color:"#d00000",
            font:"'Oswald', sans-serif",
            nameSize:"42px"
        },

        // 4 Elegant Minimal
        {
            bg:"#f5f5f5",
            color:"#222222",
            font:"'Raleway', sans-serif",
            nameSize:"36px"
        },

        // 5 Fashion Style
        {
            bg:"#2b2d42",
            color:"#ef233c",
            font:"'Bebas Neue', sans-serif",
            nameSize:"44px"
        },

        // 6 Clean Corporate
        {
            bg:"#14213d",
            color:"#fca311",
            font:"'Poppins', sans-serif",
            nameSize:"38px"
        }

    ];

    layouts.forEach(layout => {

        let board = document.createElement("div");
        board.className="board";
        board.style.background=layout.bg;
        board.style.color=layout.color;
        board.style.fontFamily=layout.font;
        board.style.aspectRatio=ratio;

        board.innerHTML = `
            <div style="font-size:${layout.nameSize}; font-weight:800; letter-spacing:2px;">
                ${name}
            </div>
            <div class="tag">${tag}</div>
            <div class="services">${services}</div>
        `;

        preview.appendChild(board);

    });

}

</script>

</body>
</html>
